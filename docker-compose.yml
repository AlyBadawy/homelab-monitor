services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: homelab-monitor-backend:0.14.0
    container_name: homelab-monitor-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATA_DIR: /data
      POLL_INTERVAL_MS: 10000

      # ----- Proxmox -----
      # Try the NPM-proxied URL first (has a valid cert, so TLS can be verified).
      # If /api2/json calls fail, switch to the direct IP below and flip
      # PROXMOX_INSECURE_TLS to "true" since PVE ships with a self-signed cert.
      PROXMOX_BASE_URL: "${PROXMOX_BASE_URL:-https://proxmox.in.alybadawy.com}"
      # Fallback if NPM path breaks: set PROXMOX_BASE_URL=https://172.20.20.10:8006
      # and PROXMOX_INSECURE_TLS=true in the stack env vars.

      PROXMOX_TOKEN_ID: "${PROXMOX_TOKEN_ID}"
      # Secret is injected via Portainer stack env vars — never commit it.
      # NOTE: PVE 9.1.7 has a bug where non-root API tokens return empty
      # data for NFS content listings even with full Datastore.Audit +
      # VM.Audit permissions. Use a token created under the root user for
      # this dashboard. The token is read-only (GETs only), so the blast
      # radius of using a root-owned token here is still bounded.
      PROXMOX_TOKEN_SECRET: "${PROXMOX_TOKEN_SECRET}"

      # Set to "true" when using the direct IP (self-signed cert).
      PROXMOX_INSECURE_TLS: "${PROXMOX_INSECURE_TLS:-false}"

      # ----- UNAS (UniFi UNAS Pro, via SSH) -----
      # Two auth paths:
      #   1. Key auth (preferred): create a read-only key pair on the Docker
      #      host, drop the private key at ./secrets/unas_id_ed25519, append
      #      the public key to the UNAS user's ~/.ssh/authorized_keys, and
      #      set UNAS_SSH_KEY_PATH=/secrets/unas_id_ed25519 in Portainer.
      #   2. Password auth: leave UNAS_SSH_KEY_PATH unset and set
      #      UNAS_PASSWORD in your Portainer stack env vars.
      # If both are set, the key is used; the password is the fallback.
      UNAS_NAME: "${UNAS_NAME:-UNAS}"
      UNAS_HOST: "${UNAS_HOST:-172.20.20.2}"
      UNAS_PORT: "${UNAS_PORT:-22}"
      UNAS_USER: "${UNAS_USER:-root}"
      UNAS_SSH_KEY_PATH: "${UNAS_SSH_KEY_PATH:-}"
      UNAS_SSH_KEY_PASSPHRASE: "${UNAS_SSH_KEY_PASSPHRASE:-}"
      UNAS_PASSWORD: "${UNAS_PASSWORD:-}"
      UNAS_EXEC_TIMEOUT_MS: "${UNAS_EXEC_TIMEOUT_MS:-15000}"

      # ----- Portainer (Docker containers) -----
      # Create a read-only API key in Portainer UI:
      #   User settings → Access tokens → Add access token
      # The key inherits that user's Docker permissions, so create a
      # dedicated read-only user and mint the key from it.
      # Inject both via Portainer stack env vars — never commit them.
      PORTAINER_BASE_URL: "${PORTAINER_BASE_URL:-}"
      PORTAINER_API_KEY: "${PORTAINER_API_KEY:-}"
      # Set to "true" when Portainer ships with a self-signed cert.
      PORTAINER_INSECURE_TLS: "${PORTAINER_INSECURE_TLS:-false}"
      # Optional: override the Portainer poll interval. Defaults to
      # POLL_INTERVAL_MS above. Container stats are a heavier call than
      # Proxmox stats — bump this to 15000–30000 if your host is busy.
      PORTAINER_POLL_INTERVAL_MS: "${PORTAINER_POLL_INTERVAL_MS:-}"
      # Optional: override how often volume sizes are refreshed via
      # `/system/df`. That call is materially heavier than the networks/
      # volumes list; defaults to 60000 (60s). Raise this further on hosts
      # with many large volumes if you see sustained load.
      PORTAINER_DF_INTERVAL_MS: "${PORTAINER_DF_INTERVAL_MS:-60000}"

      # ----- Nextcloud (serverinfo monitoring API) -----
      # Enable by setting BASE_URL + TOKEN. Mint the token in:
      #   Settings → Administration → Monitoring → "Metrics token"
      # The token is purpose-built for this API — no user login needed.
      # The monitor reads only; setting this grants read-only visibility
      # into active-users, file counts, free storage, apps with updates,
      # and share counts for the Nextcloud Applications tile.
      NEXTCLOUD_BASE_URL: "${NEXTCLOUD_BASE_URL:-}"
      NEXTCLOUD_TOKEN: "${NEXTCLOUD_TOKEN:-}"
      # Flip to "true" if NC serves a self-signed cert.
      NEXTCLOUD_INSECURE_TLS: "${NEXTCLOUD_INSECURE_TLS:-false}"
      # Defaults to 60s. Raise on shared hosts — the serverinfo call walks
      # the installed-apps list which can be slow on large instances.
      NEXTCLOUD_POLL_INTERVAL_MS: "${NEXTCLOUD_POLL_INTERVAL_MS:-60000}"

      # ----- Immich (admin API monitoring) -----
      # Enable by setting BASE_URL + API_KEY. Mint the key in:
      #   Account → API keys → New API Key → pick the `admin` permission set
      # The `admin` scope is required for /api/server/statistics and
      # /api/jobs (the two read-only endpoints this monitor calls).
      # The monitor never writes; flipping this on grants a read-only
      # view of library totals, per-user usage, and the job-queue grid
      # on the Immich Applications tile.
      IMMICH_BASE_URL: "${IMMICH_BASE_URL:-}"
      IMMICH_API_KEY: "${IMMICH_API_KEY:-}"
      # Flip to "true" if Immich serves a self-signed cert.
      IMMICH_INSECURE_TLS: "${IMMICH_INSECURE_TLS:-false}"
      # Defaults to 60s. /api/jobs is fast, but /api/server/statistics
      # walks every user — raise on instances with thousands of users.
      IMMICH_POLL_INTERVAL_MS: "${IMMICH_POLL_INTERVAL_MS:-60000}"
    volumes:
      - backend_data:/data
      # Read-only mount for the UNAS SSH private key. Create ./secrets on the
      # Docker host and place the key there; it never leaves the backend.
      - ./secrets:/secrets:ro
    networks:
      - homelab-monitor
    # No exposed ports by default — frontend proxies to it internally.
    # Uncomment for direct backend access during development:
    # ports:
    #   - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: homelab-monitor-frontend:0.14.0
    container_name: homelab-monitor-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Override via FRONTEND_PORT in Portainer stack env vars.
      - "${FRONTEND_PORT:-8085}:80"
    networks:
      - homelab-monitor

volumes:
  backend_data:

networks:
  homelab-monitor:
    # Created manually in Portainer (Networks → Add network, name: homelab-monitor).
    # Using an external network means other containers can attach to it later
    # without this stack owning its lifecycle.
    external: true
    name: homelab-monitor
